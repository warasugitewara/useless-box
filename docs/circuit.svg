<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .tm  { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
  .ts  { font-size: 10px; fill: #555; }
  .tp  { font-size: 10px; fill: #444; }
  .tn  { font-size: 10px; font-weight: 700; fill: #7a4e00; }
  .tb  { font-size: 11px; font-weight: 700; }
  .box-ard  { fill: #e8f7f1; stroke: #0F6E56; stroke-width: 1; }
  .box-srv  { fill: #e8f2fb; stroke: #185FA5; stroke-width: 1; }
  .box-sw   { fill: #f2f2f0; stroke: #666;    stroke-width: 1; }
  .box-batA { fill: #fdf8ed; stroke: #8a6020; stroke-width: 1; }
  .box-batB { fill: #edf8ed; stroke: #1a6e2a; stroke-width: 1.5; }
  /* 電源A 4.5V系 */
  .w5v     { stroke: #c93b2a; stroke-width: 2;   fill: none; }
  .wbus5v  { stroke: #c93b2a; stroke-width: 2.5; fill: none; }
  /* 電源B 6V系 */
  .w6v     { stroke: #1a6e2a; stroke-width: 2;   fill: none; }
  .wbus6v  { stroke: #1a6e2a; stroke-width: 2.5; fill: none; }
  /* GND共通 */
  .wgnd    { stroke: #333;    stroke-width: 2;   fill: none; }
  .wbusgnd { stroke: #333;    stroke-width: 2.5; fill: none; }
  /* 信号線: 青破線 */
  .wsig    { stroke: #1e6eb5; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
  /* コンデンサ */
  .cap     { stroke: #8a5000; stroke-width: 2.5; fill: none; }
  .cap-box { fill: #fffbe8; stroke: #c89030; stroke-width: 1.5; stroke-dasharray: 4,3; }
</style>
<rect width="860" height="500" fill="#ffffff"/>

<!-- タイトル -->
<text x="430" y="26" text-anchor="middle"
      font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#111">
  useless-box 回路図（2電源構成）
</text>

<!-- ══════════════ 電源A ══════════════ -->
<text x="58" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#c93b2a">電源A 4.5V</text>
<rect x="14" y="56" width="88" height="88" rx="8" class="box-batA"/>
<text class="tm" x="58" y="82"  text-anchor="middle">電池A</text>
<text class="ts" x="58" y="98"  text-anchor="middle">単三 × 3本</text>
<text class="ts" x="58" y="114" text-anchor="middle">4.5V</text>
<text class="ts" x="58" y="130" text-anchor="middle">Arduino・SG90</text>
<text class="tp" x="100" y="76"  text-anchor="end" fill="#c93b2a">R+</text>
<text class="tp" x="100" y="128" text-anchor="end">B−</text>

<!-- 主スイッチ -->
<rect x="115" y="70" width="54" height="26" rx="5" class="box-sw"/>
<text class="ts" x="142" y="87" text-anchor="middle">主SW</text>

<!-- 電池A R+ → 主SW → Arduino 5V (left) : 全水平 y=83 -->
<line x1="100" y1="83" x2="115" y2="83" class="w5v"/>
<line x1="169" y1="83" x2="200" y2="83" class="w5v"/>
<!-- Arduino左辺内で 5V端子 y=83 なのでそのままright へ -->

<!-- 電池A GND → (右へ x=188) → (下へ y=303) → Arduino GND(left) -->
<line x1="100" y1="128" x2="188" y2="128" class="wgnd"/>
<line x1="188" y1="128" x2="188" y2="303" class="wgnd"/>
<line x1="188" y1="303" x2="200" y2="303" class="wgnd"/>

<!-- ══════════════ 電源B ══════════════ -->
<text x="58" y="183" text-anchor="middle" font-size="10" font-weight="700" fill="#1a6e2a">電源B 6V</text>
<rect x="14" y="190" width="88" height="100" rx="8" class="box-batB"/>
<text class="tm" x="58" y="216" text-anchor="middle">電池B</text>
<text class="ts" x="58" y="232" text-anchor="middle">単三 × 4本</text>
<text class="ts" x="58" y="248" text-anchor="middle">6.0V</text>
<text class="ts" x="58" y="264" text-anchor="middle">MG996R専用</text>
<text class="tp" x="100" y="210" text-anchor="end" fill="#1a6e2a">R+</text>
<text class="tp" x="100" y="270" text-anchor="end">B−</text>

<!-- 電池B R+: (右→y=210) → (上→y=162) → (右→6Vバス x=495) -->
<line x1="100" y1="210" x2="155" y2="210" class="w6v"/>
<line x1="155" y1="210" x2="155" y2="162" class="w6v"/>
<line x1="155" y1="162" x2="495" y2="162" class="w6v"/>

<!-- 電池B GND: (右→x=102) → (下→y=385) → (右→GNDバス x=525) -->
<line x1="100" y1="270" x2="170" y2="270" class="wgnd"/>
<line x1="170" y1="270" x2="170" y2="385" class="wgnd"/>
<line x1="170" y1="385" x2="525" y2="385" class="wgnd"/>

<!-- ══════════════ Arduino UNO 3 ══════════════ -->
<rect x="200" y="45" width="150" height="295" rx="8" class="box-ard"/>
<text class="tm" x="275" y="71" text-anchor="middle">Arduino UNO 3</text>
<!-- 左辺ラベル -->
<text class="tp" x="208" y="87"  fill="#c93b2a">← 5V</text>
<text class="tp" x="208" y="307">← GND</text>
<!-- 右辺ラベル -->
<text class="tp" x="342" y="87"  text-anchor="end">5V  →</text>
<text class="tp" x="342" y="127" text-anchor="end">D5  →</text>
<text class="tp" x="342" y="182" text-anchor="end">D6  →</text>
<text class="tp" x="342" y="232" text-anchor="end">A0</text>
<text class="tp" x="342" y="244" text-anchor="end" fill="#bbb">(未接続)</text>
<text class="tp" x="342" y="262" text-anchor="end">D12 →</text>
<text class="tp" x="342" y="307" text-anchor="end">GND →</text>

<!-- ══════════════ 5V バス ══════════════ -->
<!-- Arduino right 5V(y=83) → バス x=465 -->
<line x1="350" y1="83" x2="465" y2="83" class="w5v"/>
<circle cx="465" cy="83" r="4" fill="#c93b2a"/>
<!-- 5Vバス縦線 -->
<line x1="465" y1="58" x2="465" y2="405" class="wbus5v"/>
<text class="tb" x="465" y="52" text-anchor="middle" fill="#c93b2a">5V</text>

<!-- ══════════════ 6V バス ══════════════ -->
<!-- 電池B R+ → バス接続ジャンクション -->
<circle cx="495" cy="162" r="4" fill="#1a6e2a"/>
<!-- 6Vバス縦線 -->
<line x1="495" y1="58" x2="495" y2="405" class="wbus6v"/>
<text class="tb" x="495" y="52" text-anchor="middle" fill="#1a6e2a">6V</text>

<!-- ══════════════ GND バス ══════════════ -->
<!-- Arduino right GND(y=303) → バス x=525 -->
<line x1="350" y1="303" x2="525" y2="303" class="wgnd"/>
<circle cx="525" cy="303" r="4" fill="#333"/>
<!-- 電池B GND合流ジャンクション -->
<circle cx="525" cy="385" r="4" fill="#333"/>
<!-- GNDバス縦線 -->
<line x1="525" y1="58" x2="525" y2="405" class="wbusgnd"/>
<text class="tb" x="525" y="52" text-anchor="middle" fill="#333">GND</text>

<!-- GND共通ラベル -->
<text x="340" y="400" text-anchor="middle" font-size="9" fill="#999">
  ▲ 電池A・B のGNDをここで共通接続（必須）
</text>

<!-- ══════════════ SG90（フタ）4.5V系 ══════════════ -->
<rect x="560" y="60" width="280" height="56" rx="8" class="box-srv"/>
<text class="tm" x="700" y="85"  text-anchor="middle">SG90（フタ）</text>
<text class="ts" x="700" y="103" text-anchor="middle">オレンジ：信号　赤：VCC 5V　茶：GND</text>

<!-- SG90 VCC: 5Vバス(x=465, y=80) → 右 -->
<line x1="465" y1="80" x2="560" y2="80" class="w5v"/>
<circle cx="465" cy="80" r="4" fill="#c93b2a"/>
<!-- SG90 GND: GNDバス(x=525, y=97) → 右 -->
<line x1="525" y1="97" x2="560" y2="97" class="wgnd"/>
<circle cx="525" cy="97" r="4" fill="#333"/>
<!-- D5 信号: Arduino(350,127) → 縦走路x=375 → 上y=72 → 右560 -->
<line x1="350" y1="127" x2="375" y2="127" class="wsig"/>
<line x1="375" y1="127" x2="375" y2="72"  class="wsig"/>
<line x1="375" y1="72"  x2="560" y2="72"  class="wsig"/>

<!-- ══════════════ MG996R（腕）6V系 ══════════════ -->
<rect x="560" y="158" width="280" height="56" rx="8" class="box-srv"/>
<text class="tm" x="700" y="183" text-anchor="middle">MG996R（腕）</text>
<text class="ts" x="700" y="200" text-anchor="middle">黄：信号　赤：VCC 6V　茶：GND</text>

<!-- MG996R VCC: 6Vバス(x=495, y=175) → 右 -->
<line x1="495" y1="175" x2="560" y2="175" class="w6v"/>
<circle cx="495" cy="175" r="4" fill="#1a6e2a"/>
<!-- MG996R GND: GNDバス(x=525, y=190) → 右 -->
<line x1="525" y1="190" x2="560" y2="190" class="wgnd"/>
<circle cx="525" cy="190" r="4" fill="#333"/>
<!-- D6 信号: Arduino(350,182) → 縦走路x=390 → 上y=168 → 右560 -->
<line x1="350" y1="182" x2="390" y2="182" class="wsig"/>
<line x1="390" y1="182" x2="390" y2="168" class="wsig"/>
<line x1="390" y1="168" x2="560" y2="168" class="wsig"/>

<!-- ══════════════ コンデンサ（6V系 MG996R根本）══════════════ -->
<!-- 6Vバス(x=495, y=237) → 右 コンデンサ+ 共通 -->
<circle cx="495" cy="237" r="4" fill="#1a6e2a"/>
<line x1="495" y1="237" x2="560" y2="237" class="w6v"/>
<!-- GNDバス(x=525, y=248) → コンデンサ- 共通 ← 右から -->
<circle cx="525" cy="248" r="4" fill="#333"/>
<line x1="640" y1="248" x2="525" y2="248" class="wgnd"/>
<!-- 共通縦線 -->
<line x1="560" y1="233" x2="560" y2="252" class="w6v"/>
<line x1="640" y1="233" x2="640" y2="252" class="wgnd"/>
<!-- Highlight box (バス縦線 x=465,495,525 と重ならない x=552以上) -->
<rect x="552" y="222" width="104" height="44" rx="6" class="cap-box"/>
<text class="tn" x="604" y="217" text-anchor="middle">470µF × 2（並列）</text>
<!-- C1 (y=233) -->
<line x1="560" y1="233" x2="570" y2="233" class="cap"/>
<line x1="570" y1="225" x2="570" y2="241" class="cap"/>
<line x1="577" y1="225" x2="577" y2="241" class="cap"/>
<line x1="577" y1="233" x2="640" y2="233" class="cap"/>
<text class="tp" x="563" y="229" fill="#8a5000">+</text>
<text class="tp" x="635" y="229">−</text>
<!-- C2 (y=250) -->
<line x1="560" y1="250" x2="570" y2="250" class="cap"/>
<line x1="570" y1="242" x2="570" y2="258" class="cap"/>
<line x1="577" y1="242" x2="577" y2="258" class="cap"/>
<line x1="577" y1="250" x2="640" y2="250" class="cap"/>
<text class="tp" x="563" y="247" fill="#8a5000">+</text>
<text class="tp" x="635" y="247">−</text>

<!-- ══════════════ スイッチ（箱）══════════════ -->
<rect x="560" y="268" width="280" height="52" rx="8" class="box-sw"/>
<text class="tm" x="700" y="293" text-anchor="middle">スイッチ（箱）</text>
<text class="ts" x="700" y="309" text-anchor="middle">黒：GND　白：信号</text>

<!-- SW GND: GNDバス(x=525, y=284) → 右 -->
<line x1="525" y1="284" x2="560" y2="284" class="wgnd"/>
<circle cx="525" cy="284" r="4" fill="#333"/>
<!-- D12 信号: Arduino(350,262) → 縦走路x=405 → 下y=292 → 右560 -->
<line x1="350" y1="262" x2="405" y2="262" class="wsig"/>
<line x1="405" y1="262" x2="405" y2="292" class="wsig"/>
<line x1="405" y1="292" x2="560" y2="292" class="wsig"/>

<!-- ══════════════ 凡例 ══════════════ -->
<line x1="14"  y1="440" x2="44"  y2="440" stroke="#c93b2a" stroke-width="2" fill="none"/>
<text class="ts" x="49"  y="444">電源A 5V系</text>
<line x1="135" y1="440" x2="165" y2="440" stroke="#1a6e2a" stroke-width="2" fill="none"/>
<text class="ts" x="170" y="444">電源B 6V系</text>
<line x1="255" y1="440" x2="285" y2="440" stroke="#333" stroke-width="2" fill="none"/>
<text class="ts" x="290" y="444">GND共通</text>
<line x1="370" y1="440" x2="400" y2="440" stroke="#1e6eb5" stroke-width="1.5" stroke-dasharray="6,3" fill="none"/>
<text class="ts" x="405" y="444">信号線 (D5/D6/D12)</text>
<line x1="565" y1="440" x2="595" y2="440" stroke="#8a5000" stroke-width="2" stroke-dasharray="4,3" fill="none"/>
<text class="ts" x="600" y="444">コンデンサ (6V系)</text>
<circle cx="766" cy="440" r="4" fill="#555"/>
<text class="ts" x="774" y="444">接続点</text>

<!-- ══════════════ 警告メモ ══════════════ -->
<rect x="14" y="460" width="830" height="18" rx="4" fill="#fff8e1" stroke="#f0c040" stroke-width="1"/>
<text x="430" y="473" text-anchor="middle" font-size="10" fill="#7a4e00">
  ⚠ 電池A・BのGNDを必ず共通接続すること — D6信号の基準電位が合わないとMG996Rが誤動作する
</text>
</svg>