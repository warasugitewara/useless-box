<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .tm  { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
  .ts  { font-size: 10px; fill: #555; }
  .tp  { font-size: 10px; fill: #444; }
  .tq  { font-size: 9px;  fill: #777; }
  .tn  { font-size: 10px; font-weight: 700; fill: #7a4e00; }
  .tb  { font-size: 11px; font-weight: 700; }
  .box-ard  { fill: #e8f7f1; stroke: #0F6E56; stroke-width: 1; }
  .box-srv  { fill: #e8f2fb; stroke: #185FA5; stroke-width: 1; }
  .box-sw   { fill: #f2f2f0; stroke: #666;    stroke-width: 1; }
  .box-disp { fill: #fdeeee; stroke: #B03A3A; stroke-width: 1; }
  .box-batA { fill: #fdf8ed; stroke: #8a6020; stroke-width: 1; }
  .box-batB { fill: #edf8ed; stroke: #1a6e2a; stroke-width: 1.5; }
  .w5v     { stroke: #c93b2a; stroke-width: 2;   fill: none; }
  .wbus5v  { stroke: #c93b2a; stroke-width: 2.5; fill: none; }
  .w6v     { stroke: #1a6e2a; stroke-width: 2;   fill: none; }
  .wbus6v  { stroke: #1a6e2a; stroke-width: 2.5; fill: none; }
  .wgnd    { stroke: #333;    stroke-width: 2;   fill: none; }
  .wbusgnd { stroke: #333;    stroke-width: 2.5; fill: none; }
  .wsig    { stroke: #1e6eb5; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
  .cap     { stroke: #8a5000; stroke-width: 2.5; fill: none; }
  .cap-box { fill: #fffbe8; stroke: #c89030; stroke-width: 1.5; stroke-dasharray: 4,3; }
</style>
<rect width="900" height="600" fill="#ffffff"/>

<text x="450" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111">
  useless-box 回路図（2電源構成）
</text>
<text x="450" y="42" text-anchor="middle" font-size="10" fill="#999">
  右側ブロックは Arduino のピン順に並べてある（信号線が交差しないように）
</text>

<!-- ══════════ 電源A ══════════ -->
<text x="58" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#c93b2a">電源A 4.5V</text>
<rect x="14" y="72" width="88" height="88" rx="8" class="box-batA"/>
<text class="tm" x="58" y="98"  text-anchor="middle">電池A</text>
<text class="ts" x="58" y="114" text-anchor="middle">単三 × 3本</text>
<text class="ts" x="58" y="130" text-anchor="middle">4.5V</text>
<text class="tq" x="58" y="146" text-anchor="middle">Arduino・SG90・表示部</text>
<text class="tp" x="100" y="92"  text-anchor="end" fill="#c93b2a">R+</text>
<text class="tp" x="100" y="146" text-anchor="end">B−</text>

<rect x="115" y="72" width="54" height="26" rx="5" class="box-sw"/>
<text class="ts" x="142" y="89" text-anchor="middle">主SW</text>

<line x1="100" y1="85" x2="115" y2="85" class="w5v"/>
<line x1="169" y1="85" x2="200" y2="85" class="w5v"/>

<line x1="100" y1="142" x2="185" y2="142" class="wgnd"/>
<line x1="185" y1="142" x2="185" y2="418" class="wgnd"/>
<line x1="185" y1="418" x2="200" y2="418" class="wgnd"/>

<!-- ══════════ 電源B ══════════ -->
<text x="58" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#1a6e2a">電源B 6V</text>
<rect x="14" y="214" width="88" height="94" rx="8" class="box-batB"/>
<text class="tm" x="58" y="240" text-anchor="middle">電池B</text>
<text class="ts" x="58" y="256" text-anchor="middle">単三 × 4本</text>
<text class="ts" x="58" y="272" text-anchor="middle">6.0V</text>
<text class="tq" x="58" y="290" text-anchor="middle">MG996R 専用</text>
<text class="tp" x="100" y="234" text-anchor="end" fill="#1a6e2a">R+</text>
<text class="tp" x="100" y="290" text-anchor="end">B−</text>

<!-- 電池B R+ → Arduino の下を回して 6Vバスへ（ブロックを貫通しない経路）-->
<line x1="100" y1="230" x2="155" y2="230" class="w6v"/>
<line x1="155" y1="230" x2="155" y2="470" class="w6v"/>
<line x1="155" y1="470" x2="505" y2="470" class="w6v"/>
<!-- 電池B GND → さらに下を回して GNDバスへ -->
<line x1="100" y1="286" x2="136" y2="286" class="wgnd"/>
<line x1="136" y1="286" x2="136" y2="502" class="wgnd"/>
<line x1="136" y1="502" x2="535" y2="502" class="wgnd"/>
<circle cx="505" cy="470" r="4" fill="#1a6e2a"/>
<circle cx="535" cy="502" r="4" fill="#333"/>

<!-- ══════════ Arduino ══════════ -->
<rect x="200" y="45" width="150" height="390" rx="8" class="box-ard"/>
<text class="tm" x="275" y="70" text-anchor="middle">Arduino UNO 3</text>
<text class="tp" x="208" y="89"  fill="#c93b2a">← 5V</text>
<text class="tp" x="208" y="422">← GND</text>
<text class="tp" x="342" y="89"  text-anchor="end">5V  →</text>
<text class="tp" x="342" y="134" text-anchor="end">D2  →</text>
<text class="tp" x="342" y="162" text-anchor="end">D3  →</text>
<text class="tp" x="342" y="190" text-anchor="end">D4  →</text>
<text class="tp" x="342" y="234" text-anchor="end">D5  →</text>
<text class="tp" x="342" y="279" text-anchor="end">D6  →</text>
<text class="tp" x="342" y="322" text-anchor="end">A0</text>
<text class="tq" x="342" y="334" text-anchor="end">(未接続)</text>
<text class="tp" x="342" y="362" text-anchor="end">D12 →</text>
<text class="tp" x="342" y="422" text-anchor="end">GND →</text>

<line x1="350" y1="85"  x2="475" y2="85"  class="w5v"/>
<circle cx="475" cy="85" r="4" fill="#c93b2a"/>
<line x1="350" y1="418" x2="535" y2="418" class="wgnd"/>
<circle cx="535" cy="418" r="4" fill="#333"/>

<!-- ══════════ バス ══════════ -->
<line x1="475" y1="70"  x2="475" y2="226" class="wbus5v"/>
<text class="tb" x="475" y="62" text-anchor="middle" fill="#c93b2a">5V</text>
<line x1="505" y1="276" x2="505" y2="470" class="wbus6v"/>
<text class="tb" x="505" y="268" text-anchor="middle" fill="#1a6e2a">6V</text>
<line x1="535" y1="70"  x2="535" y2="502" class="wbusgnd"/>
<text class="tb" x="535" y="62" text-anchor="middle" fill="#333">GND</text>

<!-- ══════════ 7セグ表示部（D2/D3/D4）══════════ -->
<rect x="570" y="56" width="300" height="104" rx="8" class="box-disp"/>
<text class="tm" x="720" y="80" text-anchor="middle">7セグ表示部</text>
<text class="ts" x="720" y="98" text-anchor="middle">74HC595 × 2（カスケード）+ A-552SRD</text>
<text class="tq" x="720" y="116" text-anchor="middle">DS / SH_CP / ST_CP ＋ VCC・GND</text>
<text class="tq" x="720" y="140" text-anchor="middle" fill="#B03A3A">詳細な結線は docs/display.svg を参照</text>

<line x1="350" y1="130" x2="366" y2="130" class="wsig"/>
<line x1="366" y1="130" x2="366" y2="82"  class="wsig"/>
<line x1="366" y1="82"  x2="570" y2="82"  class="wsig"/>

<line x1="350" y1="158" x2="381" y2="158" class="wsig"/>
<line x1="381" y1="158" x2="381" y2="98"  class="wsig"/>
<line x1="381" y1="98"  x2="570" y2="98"  class="wsig"/>

<line x1="350" y1="186" x2="396" y2="186" class="wsig"/>
<line x1="396" y1="186" x2="396" y2="114" class="wsig"/>
<line x1="396" y1="114" x2="570" y2="114" class="wsig"/>

<line x1="475" y1="132" x2="570" y2="132" class="w5v"/>
<circle cx="475" cy="132" r="4" fill="#c93b2a"/>
<line x1="535" y1="150" x2="570" y2="150" class="wgnd"/>
<circle cx="535" cy="150" r="4" fill="#333"/>

<!-- ══════════ SG90（D5）══════════ -->
<rect x="570" y="180" width="300" height="56" rx="8" class="box-srv"/>
<text class="tm" x="720" y="204" text-anchor="middle">SG90（フタ）</text>
<text class="ts" x="720" y="222" text-anchor="middle">オレンジ：信号　赤：VCC 5V　茶：GND</text>

<line x1="350" y1="234" x2="411" y2="234" class="wsig"/>
<line x1="411" y1="234" x2="411" y2="194" class="wsig"/>
<line x1="411" y1="194" x2="570" y2="194" class="wsig"/>
<line x1="475" y1="208" x2="570" y2="208" class="w5v"/>
<circle cx="475" cy="208" r="4" fill="#c93b2a"/>
<line x1="535" y1="224" x2="570" y2="224" class="wgnd"/>
<circle cx="535" cy="224" r="4" fill="#333"/>

<!-- ══════════ MG996R（D6）══════════ -->
<rect x="570" y="256" width="300" height="56" rx="8" class="box-srv"/>
<text class="tm" x="720" y="280" text-anchor="middle">MG996R（腕）</text>
<text class="ts" x="720" y="298" text-anchor="middle">黄：信号　赤：VCC 6V　茶：GND</text>

<line x1="350" y1="279" x2="426" y2="279" class="wsig"/>
<line x1="426" y1="279" x2="426" y2="270" class="wsig"/>
<line x1="426" y1="270" x2="570" y2="270" class="wsig"/>
<line x1="505" y1="288" x2="570" y2="288" class="w6v"/>
<circle cx="505" cy="288" r="4" fill="#1a6e2a"/>
<line x1="535" y1="304" x2="570" y2="304" class="wgnd"/>
<circle cx="535" cy="304" r="4" fill="#333"/>

<!-- ══════════ コンデンサ（6V系）══════════ -->
<circle cx="505" cy="336" r="4" fill="#1a6e2a"/>
<line x1="505" y1="336" x2="572" y2="336" class="w6v"/>
<circle cx="535" cy="352" r="4" fill="#333"/>
<line x1="652" y1="352" x2="535" y2="352" class="wgnd"/>
<line x1="572" y1="330" x2="572" y2="356" class="w6v"/>
<line x1="652" y1="330" x2="652" y2="356" class="wgnd"/>
<rect x="564" y="318" width="104" height="46" rx="6" class="cap-box"/>
<text class="tn" x="616" y="313" text-anchor="middle">470µF × 2（並列）</text>
<line x1="572" y1="330" x2="582" y2="330" class="cap"/>
<line x1="582" y1="322" x2="582" y2="338" class="cap"/>
<line x1="589" y1="322" x2="589" y2="338" class="cap"/>
<line x1="589" y1="330" x2="652" y2="330" class="cap"/>
<text class="tq" x="575" y="327" fill="#8a5000">+</text>
<text class="tq" x="647" y="327">−</text>
<line x1="572" y1="356" x2="582" y2="356" class="cap"/>
<line x1="582" y1="348" x2="582" y2="364" class="cap"/>
<line x1="589" y1="348" x2="589" y2="364" class="cap"/>
<line x1="589" y1="356" x2="652" y2="356" class="cap"/>
<text class="tq" x="575" y="353" fill="#8a5000">+</text>
<text class="tq" x="647" y="353">−</text>
<text class="tq" x="700" y="344" fill="#8a5000">MG996R 根本に並列接続</text>

<!-- ══════════ スイッチ（D12）══════════ -->
<rect x="570" y="382" width="300" height="52" rx="8" class="box-sw"/>
<text class="tm" x="720" y="406" text-anchor="middle">スイッチ（箱）</text>
<text class="ts" x="720" y="422" text-anchor="middle">黒：GND　白：信号</text>

<line x1="350" y1="362" x2="441" y2="362" class="wsig"/>
<line x1="441" y1="362" x2="441" y2="396" class="wsig"/>
<line x1="441" y1="396" x2="570" y2="396" class="wsig"/>
<line x1="535" y1="414" x2="570" y2="414" class="wgnd"/>
<circle cx="535" cy="414" r="4" fill="#333"/>

<!-- ══════════ 凡例 ══════════ -->
<line x1="14"  y1="536" x2="44"  y2="536" class="w5v"/>
<text class="ts" x="50"  y="540">電源A 4.5V系</text>
<line x1="150" y1="536" x2="180" y2="536" class="w6v"/>
<text class="ts" x="186" y="540">電源B 6V系</text>
<line x1="276" y1="536" x2="306" y2="536" class="wgnd"/>
<text class="ts" x="312" y="540">GND共通</text>
<line x1="388" y1="536" x2="418" y2="536" class="wsig"/>
<text class="ts" x="424" y="540">信号線</text>
<line x1="490" y1="536" x2="520" y2="536" stroke="#8a5000" stroke-width="2" stroke-dasharray="4,3" fill="none"/>
<text class="ts" x="526" y="540">コンデンサ</text>
<circle cx="620" cy="536" r="4" fill="#555"/>
<text class="ts" x="630" y="540">接続点（交差のみの箇所は点なし）</text>

<!-- ══════════ 警告 ══════════ -->
<rect x="14" y="556" width="872" height="20" rx="4" fill="#fff8e1" stroke="#f0c040" stroke-width="1"/>
<text x="450" y="570" text-anchor="middle" font-size="10" fill="#7a4e00">
  ⚠ 電池A・BのGNDを必ず共通接続すること — D6信号の基準電位が合わないとMG996Rが誤動作する
</text>
</svg>
